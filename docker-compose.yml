version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agentdb
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"

  executor:
    build:
      context: ./executor-rs
    ports:
      - "8088:8088"

  backend:
    build:
      context: ./backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      EXECUTOR_URL: http://executor:8088
      POSTGRES_DSN: postgresql+asyncpg://agent:agent@postgres:5432/agentdb
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - executor
      - postgres
      - redis
      - qdrant

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
